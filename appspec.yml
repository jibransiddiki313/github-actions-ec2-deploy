version: 0.0
os: linux
 
files:
  - source: /
    destination: /var/www/myapp
 
permissions:
  - object: /var/www/myapp
    pattern: "**"
    owner: ec2-user
    group: ec2-user
 
hooks:
  ApplicationStop:
    - location: scripts/stop_server.sh
      timeout: 30
      runas: root
 
  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 60
      runas: root
 
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: root
 
  ValidateService:
    - location: scripts/validate.sh
      timeout: 30
      runas: root
